# remap prefix from 'C-b' to 'C-q'
unbind C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# Split panes using | and -
bind | split-window -h
bind _ split-window -v
unbind '"'
unbind %

#reload config file
bind r source-file ~/.tmux.conf

# Use alt-arrow to switch panes without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

setw -g mode-keys vi

# 1. Enable Tmux's internal clipboard (this handles OSC 52 automatically)
set -s set-clipboard on
setw -g allow-passthrough on

# 2. Define a "Smart Copy" command
# This logic checks for pbcopy (Mac), wl-copy (Wayland), or xclip (X11)
# If none are found (Headless), it does nothing, and Tmux's 'set-clipboard on' 
# takes over to send the text via OSC 52 to Ghostty.
copy_cmd=""
if-shell "command -v pbcopy"  { copy_cmd="pbcopy" }
if-shell "command -v wl-copy" { copy_cmd="wl-copy" }
if-shell "command -v xclip"   { copy_cmd="xclip -selection clipboard -i" }

# 3. Apply the binding
# We use 'copy-pipe' which sends to the system tool AND the tmux buffer
if-shell "[ -n '$copy_cmd' ]" \
    "bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel '$copy_cmd'" \
    "bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel"

